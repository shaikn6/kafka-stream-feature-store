# KafkaConnect cluster + S3 Sink connector
# Requires: Strimzi 0.39+, AWS credentials in Secret kafka-connect-aws-credentials
# Apply: kubectl apply -f k8s/kafka-connect.yaml -n kafka
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnect
metadata:
  name: feature-store-connect
  namespace: kafka
  labels:
    app: kafka-connect
    team: platform
  annotations:
    # Allow the Topic Operator to manage connector topics
    strimzi.io/use-connector-resources: "true"
spec:
  version: 3.6.0
  replicas: 3
  bootstrapServers: feature-store-cluster-kafka-bootstrap:9093
  tls:
    trustedCertificates:
      - secretName: feature-store-cluster-cluster-ca-cert
        certificate: ca.crt
  authentication:
    type: tls
    certificateAndKey:
      secretName: feature-store-connect-tls
      certificate: user.crt
      key: user.key
  # Build a custom image with the S3 connector plugin pre-installed
  build:
    output:
      type: docker
      image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/kafka-connect-s3:latest
      pushSecret: ecr-push-secret
    plugins:
      - name: camel-aws-s3-sink
        artifacts:
          - type: maven
            repository: https://repo1.maven.org/maven2
            group: org.apache.camel.kafkaconnector
            artifact: camel-aws-s3-kafka-connector
            version: 3.21.0
      - name: confluentinc-kafka-connect-s3
        artifacts:
          - type: zip
            url: https://d1i4a15mxbxib1.cloudfront.net/api/plugins/confluentinc/kafka-connect-s3/versions/10.5.7/confluentinc-kafka-connect-s3-10.5.7.zip
            sha512sum: "REPLACE_WITH_ACTUAL_SHA512"
  config:
    group.id: feature-store-connect-cluster
    offset.storage.topic: connect-cluster-offsets
    config.storage.topic: connect-cluster-configs
    status.storage.topic: connect-cluster-status
    offset.storage.replication.factor: 3
    config.storage.replication.factor: 3
    status.storage.replication.factor: 3
    key.converter: org.apache.kafka.connect.storage.StringConverter
    value.converter: io.confluent.connect.avro.AvroConverter
    value.converter.schema.registry.url: http://schema-registry:8081
    key.converter.schemas.enable: "false"
    value.converter.schemas.enable: "true"
    # Dead-letter queue for sink connector errors
    errors.deadletterqueue.topic.name: raw-events-dlq
    errors.deadletterqueue.topic.replication.factor: "3"
    errors.deadletterqueue.context.headers.enable: "true"
    errors.tolerance: all
    errors.retry.timeout: "300000"    # 5 min retry window
    errors.retry.delay.max.ms: "60000"
  externalConfiguration:
    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: kafka-connect-aws-credentials
            key: aws_access_key_id
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: kafka-connect-aws-credentials
            key: aws_secret_access_key
      - name: AWS_REGION
        valueFrom:
          secretKeyRef:
            name: kafka-connect-aws-credentials
            key: aws_region
  resources:
    requests:
      memory: 2Gi
      cpu: "500m"
    limits:
      memory: 4Gi
      cpu: "2"
  template:
    pod:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    strimzi.io/cluster: feature-store-connect
                topologyKey: kubernetes.io/hostname
---
# S3 Sink Connector — sinks raw-events to S3 in Parquet format
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: s3-sink-raw-events
  namespace: kafka
  labels:
    strimzi.io/cluster: feature-store-connect
spec:
  class: io.confluent.connect.s3.S3SinkConnector
  tasksMax: 6
  config:
    tasks.max: "6"
    topics: raw-events
    s3.region: us-east-1
    s3.bucket.name: feature-store-raw-events
    s3.part.size: "67108864"          # 64 MiB multipart uploads
    s3.compression.type: snappy
    s3.ssea.name: aws:kms
    s3.sse.kms.key.id: "arn:aws:kms:us-east-1:123456789012:key/mrk-REPLACE"
    # Partition by date/hour for efficient querying
    storage.class: io.confluent.connect.s3.storage.S3Storage
    format.class: io.confluent.connect.s3.format.parquet.ParquetFormat
    parquet.codec: snappy
    schema.compatibility: FULL
    locale: en_US
    timezone: UTC
    timestamp.extractor: RecordField
    timestamp.field: event_timestamp
    path.format: "'year'=YYYY/'month'=MM/'day'=dd/'hour'=HH"
    flush.size: "100000"              # flush after 100k records
    rotate.interval.ms: "600000"     # or 10 minutes
    rotate.schedule.interval.ms: "3600000"  # force rotate each hour
    # Error handling
    errors.tolerance: all
    errors.deadletterqueue.topic.name: raw-events-dlq
    errors.deadletterqueue.topic.replication.factor: "3"
    errors.deadletterqueue.context.headers.enable: "true"
    errors.log.enable: "true"
    errors.log.include.messages: "true"
---
# S3 Sink Connector — sinks feature-updates to S3
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: s3-sink-feature-updates
  namespace: kafka
  labels:
    strimzi.io/cluster: feature-store-connect
spec:
  class: io.confluent.connect.s3.S3SinkConnector
  tasksMax: 3
  config:
    tasks.max: "3"
    topics: feature-updates
    s3.region: us-east-1
    s3.bucket.name: feature-store-computed-features
    s3.part.size: "67108864"
    s3.compression.type: snappy
    s3.ssea.name: aws:kms
    storage.class: io.confluent.connect.s3.storage.S3Storage
    format.class: io.confluent.connect.s3.format.parquet.ParquetFormat
    parquet.codec: snappy
    schema.compatibility: BACKWARD
    locale: en_US
    timezone: UTC
    path.format: "'entity_type'=${headers.entity_type}/'year'=YYYY/'month'=MM/'day'=dd"
    flush.size: "50000"
    rotate.interval.ms: "300000"     # 5 minutes
    errors.tolerance: all
    errors.deadletterqueue.topic.name: feature-updates-dlq
    errors.deadletterqueue.topic.replication.factor: "3"
    errors.deadletterqueue.context.headers.enable: "true"
