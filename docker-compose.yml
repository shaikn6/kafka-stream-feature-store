version: "3.9"

# ---------------------------------------------------------------------------
# Kafka Stream Feature Store — local development environment
# ---------------------------------------------------------------------------
# Services:
#   zookeeper        — Kafka coordination
#   kafka            — Message broker (3-replica simulated as single broker locally)
#   schema-registry  — Confluent Schema Registry for Avro/JSON Schema
#   kafka-connect    — Kafka Connect with S3 sink connector (local MinIO)
#   kafka-ui         — Provectus Kafka UI (port 8080)
#   minio            — S3-compatible object store for local S3 sink testing
#   redis            — Serving layer / hot feature store
#   postgres         — Feature registry (feature_definitions table)
#   api              — FastAPI serving layer (port 8000)
#   consumer         — Kafka consumer daemon
# ---------------------------------------------------------------------------

x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.6.0
  networks:
    - feature-net
  depends_on:
    zookeeper:
      condition: service_healthy

services:

  # --------------------------------------------------------------------------
  # ZooKeeper — required for Kafka 3.x (non-KRaft mode)
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: feature-zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - feature-net

  # --------------------------------------------------------------------------
  # Kafka broker (single-node for local dev, mirrors 3-broker prod topology)
  # --------------------------------------------------------------------------
  kafka:
    <<: *kafka-common
    container_name: feature-kafka
    hostname: kafka
    ports:
      - "9092:9092"      # external (host access)
      - "9101:9101"      # JMX
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_COMPRESSION_TYPE: lz4
      KAFKA_MAX_MESSAGE_BYTES: 10485760
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_HEAP_OPTS: "-Xmx1G -Xms1G"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - feature-net

  # --------------------------------------------------------------------------
  # Schema Registry — Avro/JSON/Protobuf schema management
  # --------------------------------------------------------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: feature-schema-registry
    hostname: schema-registry
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: _schemas
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_DEBUG: "false"
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: backward
      SCHEMA_REGISTRY_ACCESS_CONTROL_ALLOW_METHODS: GET,POST,PUT,DELETE,OPTIONS
      SCHEMA_REGISTRY_ACCESS_CONTROL_ALLOW_ORIGIN: "*"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - feature-net

  # --------------------------------------------------------------------------
  # MinIO — local S3-compatible store for Kafka Connect S3 sink testing
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: feature-minio
    hostname: minio
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - feature-net

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:RELEASE.2024-05-10T01-41-38Z
    container_name: feature-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing local/feature-store-raw-events;
      mc mb --ignore-existing local/feature-store-computed-features;
      mc mb --ignore-existing local/feature-store-audit;
      echo 'MinIO buckets ready.';
      "
    networks:
      - feature-net

  # --------------------------------------------------------------------------
  # Kafka Connect — S3 sink + custom connectors
  # --------------------------------------------------------------------------
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.0
    container_name: feature-kafka-connect
    hostname: kafka-connect
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: feature-store-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_LOG4J_ROOT_LOGLEVEL: WARN
      CONNECT_LOG4J_LOGGERS: "org.apache.kafka.connect=INFO"
      # MinIO as local S3 (override endpoint for testing)
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
    command:
      - bash
      - -c
      - |
        echo "Installing S3 connector..."
        confluent-hub install --no-prompt confluentinc/kafka-connect-s3:10.5.7
        echo "Starting Kafka Connect..."
        /etc/confluent/docker/run
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - kafka-connect-data:/tmp/kafka-connect
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s
    networks:
      - feature-net

  # --------------------------------------------------------------------------
  # Kafka UI — Provectus web console
  # --------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: feature-kafka-ui
    hostname: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: feature-store-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: feature-store-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
      KAFKA_CLUSTERS_0_METRICS_PORT: 9101
      KAFKA_CLUSTERS_0_METRICS_TYPE: JMX
      DYNAMIC_CONFIG_ENABLED: "true"
      AUTH_TYPE: DISABLED
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - feature-net

  # --------------------------------------------------------------------------
  # Redis — feature serving layer (hot feature cache)
  # --------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: feature-redis
    hostname: redis
    ports:
      - "6379:6379"
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
        --save 900 1
        --save 300 10
        --save 60 10000
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - feature-net

  # --------------------------------------------------------------------------
  # PostgreSQL — feature registry and metadata store
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: feature-postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: feature_user
      POSTGRES_PASSWORD: feature_pass
      POSTGRES_DB: feature_registry
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feature_user -d feature_registry"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - feature-net

  # --------------------------------------------------------------------------
  # API — FastAPI feature serving layer
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: feature-api
    hostname: api
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://feature_user:feature_pass@postgres:5432/feature_registry
      LOG_LEVEL: INFO
      WORKERS: "4"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - feature-net

  # --------------------------------------------------------------------------
  # Consumer — Kafka feature computation daemon
  # --------------------------------------------------------------------------
  consumer:
    build:
      context: .
      dockerfile: Dockerfile
      target: consumer
    container_name: feature-consumer
    hostname: consumer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_GROUP_ID: feature-store-consumer-group
      KAFKA_INPUT_TOPIC: raw-events
      KAFKA_OUTPUT_TOPIC: feature-updates
      KAFKA_DLQ_TOPIC: raw-events-dlq
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://feature_user:feature_pass@postgres:5432/feature_registry
      LOG_LEVEL: INFO
      MAX_POLL_RECORDS: "500"
      MAX_POLL_INTERVAL_MS: "300000"
      SESSION_TIMEOUT_MS: "45000"
      HEARTBEAT_INTERVAL_MS: "15000"
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - feature-net

networks:
  feature-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  kafka-connect-data:
  minio-data:
  redis-data:
  postgres-data:
