name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (flake8)
        run: |
          pip install flake8
          flake8 feature_store/ stream/ analytics/ store/ tests/ \
            --max-line-length=120 --ignore=E501,W503

      - name: Type check (mypy)
        run: |
          pip install mypy types-redis
          mypy feature_store/ --ignore-missing-imports --no-strict-optional || true

      - name: Run V1 tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/test_consumer.py tests/test_producer.py \
            tests/test_monitor.py tests/test_serving.py -v \
            --cov=feature_store \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Run V2 tests (no Spark — DuckDB + windowed agg + versioner)
        run: |
          pytest tests/test_v2_windowed_agg.py \
                 tests/test_v2_feature_versioner.py \
                 tests/test_v2_feature_query.py \
                 -v --tb=short

      - name: Run V2 Spark tests (PySpark required)
        run: |
          pytest tests/test_v2_spark_pipeline.py -v --tb=short || \
            echo "Spark tests skipped (pyspark may not be installed in this matrix)"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: matrix.python-version == '3.9'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t feature-store:ci .

      - name: Verify image entrypoint
        run: |
          docker run --rm feature-store:ci uvicorn --version
