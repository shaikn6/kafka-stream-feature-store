name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (flake8)
        run: |
          pip install flake8
          flake8 feature_store/ stream/ analytics/ store/ tests/ \
            --max-line-length=120 --ignore=E501,W503,E402,F401,F841

      - name: Type check (mypy)
        run: |
          pip install mypy types-redis
          mypy feature_store/ --ignore-missing-imports --no-strict-optional || true

      - name: Run V1 tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/test_consumer.py tests/test_producer.py \
            tests/test_monitor.py tests/test_serving.py tests/test_registry.py -v \
            --cov=feature_store \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=95

      - name: Run V2 tests (no Spark — DuckDB + windowed agg + versioner)
        run: |
          pytest tests/test_v2_windowed_agg.py \
                 tests/test_v2_feature_versioner.py \
                 tests/test_v2_feature_query.py \
                 -v --tb=short

      - name: Run V2 Spark tests (PySpark required)
        run: |
          pytest tests/test_v2_spark_pipeline.py -v --tb=short || \
            echo "Spark tests skipped (pyspark may not be installed in this matrix)"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.9'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t feature-store:ci .

      - name: Verify image entrypoint
        run: |
          docker run --rm feature-store:ci uvicorn --version

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: SAST — bandit
        run: bandit -r feature_store/ -ll -ii --format json -o bandit-report.json; bandit -r feature_store/ -ll -ii
        continue-on-error: true
      - name: Dependency audit — pip-audit
        run: pip-audit --desc -r requirements.txt
        continue-on-error: true
      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.run_id }}
          path: bandit-report.json
          if-no-files-found: ignore
